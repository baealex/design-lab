<!-- title: Design Lab — BaeJino -->

<style>
    @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;900&family=Inter:wght@400;500&display=swap');

    body {
        background: #08080f;
        color: #fff;
        font-family: 'Inter', sans-serif;
        overflow: hidden;
        height: 100vh;
        height: 100dvh;
    }

    /* Quiet ambient field behind the catalog */
    .bg-ambient {
        position: fixed;
        inset: 0;
        z-index: 0;
        overflow: hidden;
        pointer-events: none;
        background:
            radial-gradient(circle at 8% 0%, rgba(99, 102, 241, 0.1), transparent 32%),
            radial-gradient(circle at 82% 100%, rgba(6, 182, 212, 0.06), transparent 30%),
            #08080f;
    }

    /* App layout */
    .app {
        position: relative;
        z-index: 1;
        display: flex;
        flex-direction: column;
        height: 100vh;
        height: 100dvh;
    }

    /* Header */
    .app-header {
        display: flex;
        align-items: center;
        padding: 16px 24px;
        background: rgba(255, 255, 255, 0.03);
        backdrop-filter: blur(24px);
        -webkit-backdrop-filter: blur(24px);
        border-bottom: 1px solid rgba(255, 255, 255, 0.06);
        flex-shrink: 0;
        position: relative;
    }

    .app-header::after {
        content: '';
        position: absolute;
        top: 0;
        left: 0;
        right: 0;
        height: 1px;
        background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.08), transparent);
    }

    .header-left {
        display: flex;
        align-items: center;
        gap: 12px;
        flex: 1;
    }

    .header-summary {
        color: rgba(255, 255, 255, 0.32);
        font-family: 'Montserrat', sans-serif;
        font-size: 0.62rem;
        font-weight: 600;
        letter-spacing: 0.04em;
        margin-right: 16px;
        white-space: nowrap;
    }

    .brand {
        display: inline-flex;
        align-items: center;
        gap: 9px;
        color: inherit;
        text-decoration: none;
    }

    .brand-mark {
        display: block;
        width: 27px;
        height: 27px;
        flex: none;
    }

    .logo {
        font-family: 'Montserrat', sans-serif;
        font-size: 1rem;
        font-weight: 900;
        margin: 0;
        letter-spacing: -0.02em;
    }

    .logo-owner {
        margin-left: 0.35rem;
        color: rgba(255, 255, 255, 0.35);
        font-size: 0.68rem;
        font-weight: 500;
        letter-spacing: 0;
    }

    .header-link {
        color: rgba(255, 255, 255, 0.3);
        text-decoration: none;
        transition: color 0.2s;
        display: flex;
        align-items: center;
    }

    .header-link:hover {
        color: rgba(255, 255, 255, 0.6);
    }

    /* Main split */
    .app-main {
        display: flex;
        flex: 1;
        min-height: 0;
    }

    /* Preview pane */
    .preview-pane {
        flex: 3;
        position: relative;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 20px;
    }

    .preview-frame {
        position: relative;
        width: 100%;
        height: 100%;
        border-radius: 16px;
        overflow: hidden;
        background: rgba(255, 255, 255, 0.03);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        border: 1px solid rgba(255, 255, 255, 0.08);
        box-shadow:
            0 8px 32px rgba(0, 0, 0, 0.4),
            inset 0 1px 0 rgba(255, 255, 255, 0.06);
    }

    .preview-frame::before {
        content: '';
        position: absolute;
        top: 0;
        left: 0;
        right: 0;
        height: 1px;
        background: linear-gradient(90deg, transparent 10%, rgba(255, 255, 255, 0.15) 50%, transparent 90%);
        z-index: 2;
    }

    .preview-frame iframe {
        position: absolute;
        inset: 0;
        width: 100%;
        height: 100%;
        border: none;
        opacity: 1;
        transition: opacity 0.3s ease;
    }

    .preview-frame iframe.fade-out {
        opacity: 0;
    }

    .preview-bar {
        position: absolute;
        bottom: 0;
        left: 0;
        right: 0;
        padding: 12px 20px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        background: rgba(8, 8, 15, 0.7);
        backdrop-filter: blur(20px);
        -webkit-backdrop-filter: blur(20px);
        border-top: 1px solid rgba(255, 255, 255, 0.06);
        z-index: 2;
        opacity: 0.82;
        transition: opacity 0.3s ease;
    }

    .preview-frame:hover .preview-bar,
    .preview-frame:focus-within .preview-bar {
        opacity: 1;
    }

    .preview-info {
        min-width: 0;
        flex: 1;
    }

    .preview-eyebrow {
        display: flex;
        align-items: center;
        gap: 8px;
        color: rgba(255, 255, 255, 0.34);
        font-family: 'Montserrat', sans-serif;
        font-size: 0.56rem;
        font-weight: 700;
        letter-spacing: 0.08em;
        margin-bottom: 3px;
        text-transform: uppercase;
    }

    .preview-title {
        font-family: 'Montserrat', sans-serif;
        font-size: 0.82rem;
        font-weight: 700;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
    }

    .preview-desc {
        font-size: 0.7rem;
        color: rgba(255, 255, 255, 0.4);
        margin-top: 2px;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
    }

    .preview-actions {
        display: flex;
        align-items: center;
        gap: 8px;
        flex-shrink: 0;
    }

    .preview-step {
        color: rgba(255, 255, 255, 0.3);
        font-family: 'Montserrat', sans-serif;
        font-size: 0.6rem;
        font-weight: 600;
        min-width: 42px;
        text-align: center;
    }

    .preview-nav {
        display: inline-flex;
        align-items: center;
        gap: 4px;
    }

    .preview-nav-button {
        width: 30px;
        height: 30px;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        padding: 0;
        border-radius: 8px;
        border: 1px solid rgba(255, 255, 255, 0.08);
        background: rgba(255, 255, 255, 0.05);
        color: rgba(255, 255, 255, 0.58);
        cursor: pointer;
        transition: background 0.2s, color 0.2s, border-color 0.2s;
    }

    .preview-nav-button:hover {
        background: rgba(255, 255, 255, 0.11);
        border-color: rgba(255, 255, 255, 0.14);
        color: #fff;
    }

    .preview-nav-button:focus-visible {
        outline: 2px solid rgba(255, 255, 255, 0.5);
        outline-offset: 2px;
    }

    .preview-nav-button svg {
        width: 15px;
        height: 15px;
        fill: none;
        stroke: currentColor;
        stroke-width: 2;
        stroke-linecap: round;
        stroke-linejoin: round;
    }

    .preview-open {
        color: rgba(255, 255, 255, 0.7);
        text-decoration: none;
        font-size: 0.72rem;
        font-weight: 600;
        padding: 6px 14px;
        border-radius: 8px;
        background: rgba(255, 255, 255, 0.08);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        border: 1px solid rgba(255, 255, 255, 0.1);
        transition: all 0.2s;
        flex-shrink: 0;
        white-space: nowrap;
    }

    .preview-open:hover {
        background: rgba(255, 255, 255, 0.15);
        color: #fff;
    }

    .preview-open:focus-visible {
        outline: 2px solid rgba(255, 255, 255, 0.5);
        outline-offset: 2px;
    }

    /* Sidebar */
    .sidebar {
        flex: 2;
        min-width: 320px;
        max-width: 420px;
        display: flex;
        flex-direction: column;
        min-height: 0;
        background: rgba(255, 255, 255, 0.02);
        backdrop-filter: blur(20px);
        -webkit-backdrop-filter: blur(20px);
        border-left: 1px solid rgba(255, 255, 255, 0.06);
        position: relative;
    }

    .sidebar::before {
        content: '';
        position: absolute;
        top: 0;
        left: 0;
        bottom: 0;
        width: 1px;
        background: linear-gradient(180deg, rgba(255, 255, 255, 0.1), transparent 30%, transparent 70%, rgba(255, 255, 255, 0.1));
        z-index: 1;
    }

    .catalog-header {
        flex-shrink: 0;
        padding: 18px 18px 14px;
        background: rgba(8, 8, 15, 0.48);
        border-bottom: 1px solid rgba(255, 255, 255, 0.06);
        position: relative;
        z-index: 2;
    }

    .catalog-heading {
        display: flex;
        align-items: flex-start;
        justify-content: space-between;
        gap: 16px;
        margin-bottom: 14px;
    }

    .catalog-kicker {
        color: rgba(255, 255, 255, 0.26);
        font-family: 'Montserrat', sans-serif;
        font-size: 0.56rem;
        font-weight: 700;
        letter-spacing: 0.12em;
        text-transform: uppercase;
    }

    .catalog-title {
        font-family: 'Montserrat', sans-serif;
        font-size: 1rem;
        font-weight: 700;
        letter-spacing: -0.02em;
        margin-top: 4px;
    }

    .catalog-total {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        min-width: 34px;
        height: 24px;
        padding: 0 8px;
        border: 1px solid rgba(255, 255, 255, 0.08);
        border-radius: 999px;
        color: rgba(255, 255, 255, 0.45);
        font-family: 'Montserrat', sans-serif;
        font-size: 0.62rem;
        font-weight: 700;
    }

    .catalog-search {
        position: relative;
    }

    .catalog-search svg {
        position: absolute;
        top: 50%;
        left: 12px;
        width: 15px;
        height: 15px;
        fill: none;
        stroke: rgba(255, 255, 255, 0.28);
        stroke-width: 2;
        transform: translateY(-50%);
        pointer-events: none;
    }

    .catalog-search-input {
        width: 100%;
        height: 38px;
        box-sizing: border-box;
        padding: 0 38px 0 36px;
        border-radius: 10px;
        border: 1px solid rgba(255, 255, 255, 0.08);
        background: rgba(255, 255, 255, 0.035);
        color: #fff;
        font: inherit;
        font-size: 0.74rem;
        outline: none;
        transition: background 0.2s, border-color 0.2s;
    }

    .catalog-search-input::placeholder {
        color: rgba(255, 255, 255, 0.24);
    }

    .catalog-search-input:focus {
        background: rgba(255, 255, 255, 0.055);
        border-color: rgba(255, 255, 255, 0.2);
    }

    .search-shortcut {
        position: absolute;
        top: 50%;
        right: 10px;
        transform: translateY(-50%);
        color: rgba(255, 255, 255, 0.2);
        font-family: 'Montserrat', sans-serif;
        font-size: 0.56rem;
        font-weight: 700;
        pointer-events: none;
    }

    .catalog-row {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        margin-top: 10px;
    }

    .catalog-filters {
        display: inline-flex;
        gap: 3px;
        padding: 3px;
        border-radius: 9px;
        background: rgba(255, 255, 255, 0.035);
    }

    .catalog-filter {
        padding: 5px 9px;
        border: 0;
        border-radius: 6px;
        background: transparent;
        color: rgba(255, 255, 255, 0.32);
        font-family: 'Montserrat', sans-serif;
        font-size: 0.58rem;
        font-weight: 700;
        cursor: pointer;
    }

    .catalog-filter:hover {
        color: rgba(255, 255, 255, 0.7);
    }

    .catalog-filter[aria-pressed="true"] {
        background: rgba(255, 255, 255, 0.1);
        color: #fff;
        box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.05);
    }

    .catalog-filter:focus-visible {
        outline: 2px solid rgba(255, 255, 255, 0.45);
        outline-offset: 2px;
    }

    .catalog-result {
        color: rgba(255, 255, 255, 0.24);
        font-family: 'Montserrat', sans-serif;
        font-size: 0.56rem;
        font-weight: 600;
        white-space: nowrap;
    }

    .sidebar-scroll {
        flex: 1;
        overflow-y: auto;
        padding: 12px;
        scrollbar-width: thin;
        scrollbar-color: rgba(255, 255, 255, 0.08) transparent;
    }

    .sidebar-scroll::-webkit-scrollbar { width: 3px; }
    .sidebar-scroll::-webkit-scrollbar-thumb {
        background: rgba(255, 255, 255, 0.08);
        border-radius: 2px;
    }

    /* Section divider */
    .section-divider {
        font-family: 'Montserrat', sans-serif;
        font-size: 0.6rem;
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 0.1em;
        color: rgba(255, 255, 255, 0.2);
        padding: 14px 12px 8px;
        display: flex;
        align-items: center;
        gap: 10px;
        position: sticky;
        top: -12px;
        z-index: 2;
        background: rgba(10, 10, 18, 0.94);
        backdrop-filter: blur(12px);
        -webkit-backdrop-filter: blur(12px);
    }

    .section-count {
        color: rgba(255, 255, 255, 0.12);
        font-size: 0.54rem;
    }

    .section-divider::after {
        content: '';
        flex: 1;
        height: 1px;
        background: rgba(255, 255, 255, 0.06);
    }

    /* Card */
    .card {
        display: flex;
        align-items: center;
        gap: 12px;
        padding: 10px 12px;
        margin-bottom: 2px;
        border-radius: 10px;
        border: 1px solid transparent;
        background: transparent;
        cursor: pointer;
        transition: all 0.2s;
        text-decoration: none;
        color: #fff;
        width: 100%;
        text-align: left;
        font-family: inherit;
        font-size: inherit;
        position: relative;
    }

    .card:hover {
        background: rgba(255, 255, 255, 0.04);
        border-color: rgba(255, 255, 255, 0.06);
    }

    .card.active {
        background: rgba(255, 255, 255, 0.06);
        border-color: rgba(255, 255, 255, 0.12);
        box-shadow: 0 2px 12px rgba(0, 0, 0, 0.2),
                    inset 0 1px 0 rgba(255, 255, 255, 0.05);
    }

    .card.active::before {
        content: '';
        position: absolute;
        top: 10px;
        bottom: 10px;
        left: 0;
        width: 2px;
        border-radius: 2px;
        background: rgba(255, 255, 255, 0.55);
    }

    .card:focus-visible {
        outline: 2px solid rgba(255, 255, 255, 0.5);
        outline-offset: 1px;
    }

    .card-year {
        font-family: 'Montserrat', sans-serif;
        font-size: 0.68rem;
        font-weight: 800;
        color: rgba(255, 255, 255, 0.18);
        min-width: 36px;
        flex-shrink: 0;
    }

    .card-icon {
        font-size: 1.1rem;
        min-width: 36px;
        text-align: center;
        flex-shrink: 0;
    }

    .card-body {
        flex: 1;
        min-width: 0;
        display: block;
    }

    .card-title {
        display: block;
        font-family: 'Montserrat', sans-serif;
        font-size: 0.78rem;
        font-weight: 700;
        line-height: 1.3;
    }

    .card-desc {
        display: block;
        font-size: 0.68rem;
        color: rgba(255, 255, 255, 0.3);
        margin-top: 1px;
        line-height: 1.4;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
    }

    .card.active .card-year {
        color: rgba(255, 255, 255, 0.35);
    }

    .card.active .card-desc {
        color: rgba(255, 255, 255, 0.45);
    }

    .catalog-empty {
        padding: 44px 24px;
        color: rgba(255, 255, 255, 0.28);
        font-size: 0.72rem;
        line-height: 1.6;
        text-align: center;
    }

    .catalog-empty strong {
        display: block;
        color: rgba(255, 255, 255, 0.58);
        font-family: 'Montserrat', sans-serif;
        font-size: 0.78rem;
        margin-bottom: 4px;
    }

    .visually-hidden {
        position: absolute;
        width: 1px;
        height: 1px;
        padding: 0;
        margin: -1px;
        overflow: hidden;
        clip: rect(0, 0, 0, 0);
        white-space: nowrap;
        border: 0;
    }

    /* Reduced motion */
    @media (prefers-reduced-motion: reduce) {
        .preview-frame iframe { transition: none !important; }
        .preview-bar { transition: none !important; opacity: 1 !important; }
        .card,
        .catalog-search-input,
        .preview-nav-button { transition: none !important; }
    }

    /* Mobile */
    @media screen and (max-width: 768px) {
        .app-main {
            flex-direction: column;
        }

        .app-header {
            padding: 12px 16px;
        }

        .header-summary {
            display: none;
        }

        .preview-pane {
            flex: none;
            height: 36vh;
            height: 36dvh;
            padding: 12px;
        }

        .preview-frame {
            border-radius: 12px;
        }

        .preview-bar {
            opacity: 1;
            padding: 10px 16px;
        }

        .sidebar {
            flex: 1;
            min-width: 0;
            max-width: none;
            border-left: none;
            border-top: 1px solid rgba(255, 255, 255, 0.06);
        }

        .sidebar::before {
            display: none;
        }

        .sidebar-scroll {
            padding: 8px;
        }

        .catalog-header {
            padding: 14px 14px 12px;
        }

        .catalog-heading {
            margin-bottom: 10px;
        }

        .section-divider {
            top: -8px;
        }

        .preview-step {
            display: none;
        }

        .card {
            padding: 10px;
        }
    }

    @media screen and (max-width: 480px) {
        .preview-pane {
            height: 34vh;
            height: 34dvh;
            padding: 8px;
        }

        .preview-bar {
            gap: 8px;
            padding: 9px 12px;
        }

        .preview-eyebrow {
            font-size: 0.5rem;
        }

        .preview-desc {
            display: none;
        }

        .preview-actions {
            gap: 4px;
        }

        .preview-open {
            padding: 6px 10px;
        }

        .catalog-row {
            gap: 8px;
        }

        .catalog-filter {
            padding: 5px 7px;
        }

        .card-desc {
            display: none;
        }
    }
</style>

<body>
    <div class="bg-ambient" aria-hidden="true"></div>

    <div class="app">
        <header class="app-header" role="banner">
            <div class="header-left">
                <a class="brand" href="/" aria-label="Design Lab by BaeJino home">
                    <img class="brand-mark" src="/assets/images/brand-mark.svg" alt="">
                    <h1 class="logo">Design Lab <span class="logo-owner">by BaeJino</span></h1>
                </a>
            </div>
            <div class="header-summary" id="header-summary"></div>
            <a class="header-link" href="https://github.com/baealex/design" target="_blank" rel="noopener noreferrer" aria-label="View source on GitHub">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M12 0c-6.626 0-12 5.373-12 12 0 5.302 3.438 9.8 8.207 11.387.599.111.793-.261.793-.577v-2.234c-3.338.726-4.033-1.416-4.033-1.416-.546-1.387-1.333-1.756-1.333-1.756-1.089-.745.083-.729.083-.729 1.205.084 1.839 1.237 1.839 1.237 1.07 1.834 2.807 1.304 3.492.997.107-.775.418-1.305.762-1.604-2.665-.305-5.467-1.334-5.467-5.931 0-1.311.469-2.381 1.236-3.221-.124-.303-.535-1.524.117-3.176 0 0 1.008-.322 3.301 1.23.957-.266 1.983-.399 3.003-.404 1.02.005 2.047.138 3.006.404 2.291-1.552 3.297-1.23 3.297-1.23.653 1.653.242 2.874.118 3.176.77.84 1.235 1.911 1.235 3.221 0 4.609-2.807 5.624-5.479 5.921.43.372.823 1.102.823 2.222v3.293c0 .319.192.694.801.576 4.765-1.589 8.199-6.086 8.199-11.386 0-6.627-5.373-12-12-12z"/></svg>
            </a>
        </header>

        <div class="app-main">
            <div class="preview-pane" aria-label="Design preview">
                <div class="preview-frame">
                    <iframe id="preview-iframe" title="Design preview"></iframe>
                    <div class="preview-bar">
                        <div class="preview-info">
                            <div class="preview-eyebrow">
                                <span id="preview-category"></span>
                                <span aria-hidden="true">&middot;</span>
                                <span id="preview-year"></span>
                            </div>
                            <div class="preview-title" id="preview-title"></div>
                            <div class="preview-desc" id="preview-desc"></div>
                        </div>
                        <div class="preview-actions">
                            <span class="preview-step" id="preview-step" aria-live="polite"></span>
                            <div class="preview-nav" aria-label="Preview navigation">
                                <button class="preview-nav-button" id="preview-prev" type="button" aria-label="Previous exhibit">
                                    <svg viewBox="0 0 24 24" aria-hidden="true"><path d="m15 18-6-6 6-6"/></svg>
                                </button>
                                <button class="preview-nav-button" id="preview-next" type="button" aria-label="Next exhibit">
                                    <svg viewBox="0 0 24 24" aria-hidden="true"><path d="m9 18 6-6-6-6"/></svg>
                                </button>
                            </div>
                            <a class="preview-open" id="preview-open" href="#">Open</a>
                        </div>
                    </div>
                </div>
            </div>

            <aside class="sidebar" role="complementary" aria-label="Design catalog">
                <div class="catalog-header">
                    <div class="catalog-heading">
                        <div>
                            <div class="catalog-kicker">Explore the archive</div>
                            <div class="catalog-title">Design Index</div>
                        </div>
                        <span class="catalog-total" id="catalog-total"></span>
                    </div>
                    <div class="catalog-search">
                        <label class="visually-hidden" for="catalog-search-input">Search exhibits</label>
                        <svg viewBox="0 0 24 24" aria-hidden="true"><circle cx="11" cy="11" r="7"/><path d="m16.5 16.5 4 4"/></svg>
                        <input class="catalog-search-input" id="catalog-search-input" type="search" placeholder="Search title, year, or idea" autocomplete="off">
                        <span class="search-shortcut" aria-hidden="true">/</span>
                    </div>
                    <div class="catalog-row">
                        <div class="catalog-filters" aria-label="Filter exhibits">
                            <button class="catalog-filter" type="button" data-filter="all" aria-pressed="true">All</button>
                            <button class="catalog-filter" type="button" data-filter="design" aria-pressed="false">Trends</button>
                            <button class="catalog-filter" type="button" data-filter="concept" aria-pressed="false">Concepts</button>
                        </div>
                        <span class="catalog-result" id="catalog-result" role="status" aria-live="polite"></span>
                    </div>
                </div>
                <div class="sidebar-scroll" id="sidebar-scroll"></div>
            </aside>
        </div>
    </div>
</body>

<script>
    function readPageData() {
        var element = document.getElementById('lab-page-data');
        if (!element) return { pages: [] };

        try {
            return JSON.parse(element.textContent || '{}');
        } catch (error) {
            console.error('Could not parse Lab page data.', error);
            return { pages: [] };
        }
    }

    var pages = [];
    var designPages = [];
    var conceptPages = [];
    var allPages = [];

    function setPageCollections(nextPages) {
        pages = Array.isArray(nextPages) ? nextPages : [];
        designPages = pages
            .filter(function(p) { return p.category === 'design' && p.year !== null; })
            .sort(function(a, b) { return a.year - b.year; });
        conceptPages = pages
            .filter(function(p) { return p.category === 'concept' && p.year !== null; })
            .sort(function(a, b) { return a.year - b.year; });
        allPages = designPages.concat(conceptPages);
    }

    setPageCollections(readPageData().pages);

    var $iframe = document.getElementById('preview-iframe');
    var $previewCategory = document.getElementById('preview-category');
    var $previewYear = document.getElementById('preview-year');
    var $previewTitle = document.getElementById('preview-title');
    var $previewDesc = document.getElementById('preview-desc');
    var $previewStep = document.getElementById('preview-step');
    var $previewPrev = document.getElementById('preview-prev');
    var $previewNext = document.getElementById('preview-next');
    var $previewOpen = document.getElementById('preview-open');
    var $sidebarScroll = document.getElementById('sidebar-scroll');
    var $headerSummary = document.getElementById('header-summary');
    var $catalogTotal = document.getElementById('catalog-total');
    var $catalogResult = document.getElementById('catalog-result');
    var $catalogSearch = document.getElementById('catalog-search-input');
    var $filterButtons = document.querySelectorAll('.catalog-filter');

    var currentPage = null;
    var activeCard = null;
    var isFirstLoad = true;
    var activeFilter = 'all';
    var searchQuery = '';

    function cleanTitle(title) {
        return title.replace(/\s*\((?:19|20)\d{2}s?\)\s*$/, '');
    }

    function pageMatches(page) {
        if (activeFilter !== 'all' && page.category !== activeFilter) return false;
        if (!searchQuery) return true;

        var haystack = [
            page.title,
            page.description,
            page.year,
            page.category === 'concept' ? 'concept study' : 'design trend'
        ].join(' ').toLowerCase();

        return haystack.indexOf(searchQuery) > -1;
    }

    function getVisiblePages() {
        return allPages.filter(pageMatches);
    }

    function createCard(page) {
        var button = document.createElement('button');
        button.className = 'card';
        button.type = 'button';
        button.dataset.name = page.name;
        button.setAttribute('aria-pressed', 'false');

        var year = document.createElement('span');
        year.className = 'card-year';
        year.textContent = page.year;

        var body = document.createElement('span');
        body.className = 'card-body';

        var title = document.createElement('span');
        title.className = 'card-title';
        title.textContent = cleanTitle(page.title);

        var description = document.createElement('span');
        description.className = 'card-desc';
        description.textContent = page.description;

        body.appendChild(title);
        body.appendChild(description);
        button.appendChild(year);
        button.appendChild(body);
        button.addEventListener('click', function() {
            selectPage(page);
        });

        return button;
    }

    function appendSection(fragment, label, sectionPages) {
        if (sectionPages.length === 0) return;

        var divider = document.createElement('div');
        divider.className = 'section-divider';
        divider.setAttribute('role', 'heading');
        divider.setAttribute('aria-level', '2');

        var name = document.createElement('span');
        name.textContent = label;
        var count = document.createElement('span');
        count.className = 'section-count';
        count.textContent = sectionPages.length;

        divider.appendChild(name);
        divider.appendChild(count);
        fragment.appendChild(divider);
        sectionPages.forEach(function(page) {
            fragment.appendChild(createCard(page));
        });
    }

    function renderCards() {
        var fragment = document.createDocumentFragment();
        var visible = getVisiblePages();
        var visibleDesigns = visible.filter(function(page) { return page.category === 'design'; });
        var visibleConcepts = visible.filter(function(page) { return page.category === 'concept'; });

        $sidebarScroll.textContent = '';
        activeCard = null;

        if (visible.length === 0) {
            var empty = document.createElement('div');
            empty.className = 'catalog-empty';

            var emptyTitle = document.createElement('strong');
            emptyTitle.textContent = 'No exhibits found';
            var emptyCopy = document.createElement('span');
            emptyCopy.textContent = 'Try another title, year, or idea.';

            empty.appendChild(emptyTitle);
            empty.appendChild(emptyCopy);
            fragment.appendChild(empty);
        } else {
            appendSection(fragment, 'Trends', visibleDesigns);
            appendSection(fragment, 'Concepts', visibleConcepts);
        }

        $sidebarScroll.appendChild(fragment);
        $catalogResult.textContent = visible.length + ' of ' + allPages.length;
        syncActiveCard(false);
        updatePreviewNavigation();
    }

    function syncActiveCard(shouldScroll) {
        if (activeCard) {
            activeCard.classList.remove('active');
            activeCard.setAttribute('aria-pressed', 'false');
        }

        activeCard = null;
        if (!currentPage) return;

        var card = $sidebarScroll.querySelector('[data-name="' + currentPage.name + '"]');
        if (!card) return;

        card.classList.add('active');
        card.setAttribute('aria-pressed', 'true');
        activeCard = card;
        if (shouldScroll) {
            card.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
        }
    }

    function getNavigationPages() {
        var visible = getVisiblePages();
        return visible.length > 0 ? visible : allPages;
    }

    function updatePreviewNavigation() {
        if (!currentPage) return;

        var globalIndex = allPages.findIndex(function(page) {
            return page.name === currentPage.name;
        });
        $previewStep.textContent = (globalIndex + 1) + ' / ' + allPages.length;

        var navigationPages = getNavigationPages();
        var index = navigationPages.findIndex(function(page) {
            return page.name === currentPage.name;
        });
        var previous = index < 0
            ? navigationPages[navigationPages.length - 1]
            : navigationPages[(index - 1 + navigationPages.length) % navigationPages.length];
        var next = index < 0
            ? navigationPages[0]
            : navigationPages[(index + 1) % navigationPages.length];
        $previewPrev.setAttribute('aria-label', 'Previous: ' + cleanTitle(previous.title));
        $previewNext.setAttribute('aria-label', 'Next: ' + cleanTitle(next.title));
    }

    function updatePreview(page) {
        var isSamePage = currentPage && currentPage.name === page.name;
        currentPage = page;

        $previewCategory.textContent = page.category === 'concept' ? 'Concept study' : 'Design trend';
        $previewYear.textContent = page.year;
        $previewTitle.textContent = cleanTitle(page.title);
        $previewDesc.textContent = page.description;
        $previewOpen.href = '/' + page.name;
        $previewOpen.setAttribute('aria-label', 'Open ' + cleanTitle(page.title));

        if (!isSamePage && isFirstLoad) {
            isFirstLoad = false;
            $iframe.src = '/' + page.name;
        } else if (!isSamePage) {
            $iframe.classList.add('fade-out');
            setTimeout(function() {
                $iframe.src = '/' + page.name;
                $iframe.onload = function() {
                    $iframe.classList.remove('fade-out');
                };
            }, 150);
        }

        syncActiveCard(!isSamePage);
        updatePreviewNavigation();
    }

    function selectPage(page) {
        updatePreview(page);
        var targetHash = '#' + page.name;
        if (window.location.hash !== targetHash) {
            window.location.hash = page.name;
        }
    }

    function findPage(name) {
        return allPages.find(function(page) { return page.name === name; });
    }

    function navigateOffset(offset) {
        var navigationPages = getNavigationPages();
        if (!currentPage || navigationPages.length === 0) return;

        var index = navigationPages.findIndex(function(page) {
            return page.name === currentPage.name;
        });
        if (index < 0) index = offset > 0 ? -1 : 0;

        var nextIndex = (index + offset + navigationPages.length) % navigationPages.length;
        selectPage(navigationPages[nextIndex]);
    }

    function setFilter(filter) {
        activeFilter = filter;
        $filterButtons.forEach(function(button) {
            button.setAttribute('aria-pressed', String(button.dataset.filter === filter));
        });
        renderCards();
    }

    $filterButtons.forEach(function(button) {
        button.addEventListener('click', function() {
            setFilter(button.dataset.filter);
        });
    });

    $catalogSearch.addEventListener('input', function() {
        searchQuery = $catalogSearch.value.trim().toLowerCase();
        renderCards();
    });

    $previewPrev.addEventListener('click', function() {
        navigateOffset(-1);
    });

    $previewNext.addEventListener('click', function() {
        navigateOffset(1);
    });

    document.addEventListener('keydown', function(e) {
        var target = e.target instanceof Element ? e.target : document.body;
        var isTextInput = target.matches('input, textarea, select, [contenteditable="true"]');

        if (e.key === '/' && !isTextInput && !e.metaKey && !e.ctrlKey && !e.altKey) {
            e.preventDefault();
            $catalogSearch.focus();
            return;
        }

        if (e.key === 'Escape' && document.activeElement === $catalogSearch && $catalogSearch.value) {
            $catalogSearch.value = '';
            searchQuery = '';
            renderCards();
            return;
        }

        if (isTextInput || target.closest('.catalog-filters') || e.metaKey || e.ctrlKey || e.altKey) return;

        if (e.key === 'ArrowDown' || e.key === 'ArrowRight') {
            e.preventDefault();
            navigateOffset(1);
        } else if (e.key === 'ArrowUp' || e.key === 'ArrowLeft') {
            e.preventDefault();
            navigateOffset(-1);
        }
    });

    window.addEventListener('hashchange', function() {
        var hash = window.location.hash.slice(1);
        var page = findPage(hash);
        if (page) {
            updatePreview(page);
        }
    });

    window.addEventListener('lab:pages-update', function(event) {
        if (!event.detail || !Array.isArray(event.detail.pages)) return;

        var currentName = currentPage && currentPage.name;
        setPageCollections(event.detail.pages);
        $headerSummary.textContent = designPages.length + ' trends · ' + conceptPages.length + ' concepts';
        $catalogTotal.textContent = allPages.length;
        $catalogTotal.setAttribute('title', allPages.length + ' exhibits');
        renderCards();

        var nextPage = (currentName && findPage(currentName)) || allPages[0];
        if (nextPage) {
            if (!currentName || nextPage.name !== currentName) {
                history.replaceState(null, '', '#' + nextPage.name);
            }
            updatePreview(nextPage);
        }
    });

    $headerSummary.textContent = designPages.length + ' trends · ' + conceptPages.length + ' concepts';
    $catalogTotal.textContent = allPages.length;
    $catalogTotal.setAttribute('title', allPages.length + ' exhibits');
    renderCards();

    var hash = window.location.hash.slice(1);
    var initialPage = (hash && findPage(hash)) || allPages[0];
    if (initialPage) {
        if (!hash) {
            history.replaceState(null, '', '#' + initialPage.name);
        }
        updatePreview(initialPage);
    }
</script>
